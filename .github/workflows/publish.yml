name: publish

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi:
    name: publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install uv
      - run: uv sync --extra dev --locked
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest
      - run: uv build
      - run: uv run python scripts/release_smoke.py --wheel dist/*.whl --sdist dist/*.tar.gz --allow-network-install
      - run: uvx twine check dist/*
      - run: uv publish --trusted-publishing always dist/*
